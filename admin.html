<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IDNova Admin V1.0</title>


<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
}

body{
margin:0;
background:#f5f6fa;
color:#111;
}


.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}


.box{

background:#111;
color:white;
padding:40px;
border-radius:25px;
width:90%;
max-width:400px;
text-align:center;

}


input{

width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:0;

}


button{

width:100%;
padding:15px;
border:0;
border-radius:15px;
background:white;
font-size:16px;

}


.dashboard{

display:none;
padding:25px;

}


.card{

background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;

}


.stats{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;

}


.number{

font-size:30px;
font-weight:bold;

}


table{

width:100%;
border-collapse:collapse;

}


td,th{

padding:12px;
border-bottom:1px solid #eee;

}


select{

padding:8px;
border-radius:8px;

}



</style>

</head>


<body>


<div class="login" id="login">


<div class="box">

<h1>IDNova</h1>

<p>Admin V1.0</p>


<input id="user" placeholder="管理员账号">


<input id="pass" type="password" placeholder="密码">


<button onclick="login()">
登录后台
</button>


</div>


</div>





<div class="dashboard" id="dashboard">


<h1>
IDNova 管理后台
</h1>


<div class="stats">


<div class="card">

<div class="number">12</div>

申请数量

</div>



<div class="card">

<div class="number">5</div>

处理中

</div>



<div class="card">

<div class="number">7</div>

完成

</div>


</div>





<div class="card">


<h2>
服务申请管理
</h2>



<table>


<tr>

<th>
编号
</th>

<th>
客户
</th>

<th>
状态
</th>

</tr>



<tr>

<td>
ID20260714001
</td>

<td>
张三
</td>

<td>

<select>

<option>
待处理
</option>

<option>
处理中
</option>

<option>
完成
</option>


</select>


</td>

</tr>



<tr>

<td>
ID20260714002
</td>

<td>
李四
</td>

<td>

<select>

<option>
处理中
</option>

<option>
完成
</option>


</select>

</td>


</tr>



</table>


</div>



</div>




<script>


function login(){


let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;



if(u=="admin"&&p=="123456"){


document.getElementById("login").style.display="none";


document.getElementById("dashboard").style.display="block";


}

else{


alert("账号或密码错误");


}


}



</script>



</body>

</html>
