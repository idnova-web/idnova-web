<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>IDNova Admin V1.1</title>

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
}

body{
margin:0;
background:#f5f5f7;
color:#111;
}


.login{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

}


.login-box{

width:90%;
max-width:380px;
background:#111;
color:white;
padding:40px;
border-radius:30px;
text-align:center;

}


input{

width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:0;

}


button{

width:100%;
padding:14px;
border:0;
border-radius:12px;
background:white;

}


.admin{

display:none;
padding:25px;

}


.header{

background:#111;
color:white;
padding:30px;
border-radius:25px;

}



.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;

}


.card{

background:white;
padding:20px;
border-radius:20px;

}


.num{

font-size:32px;
font-weight:bold;

}


table{

width:100%;
margin-top:20px;
border-collapse:collapse;

background:white;
border-radius:20px;
overflow:hidden;

}


th,td{

padding:15px;
border-bottom:1px solid #eee;

}


select{

padding:8px;
border-radius:8px;

}



@media(max-width:700px){

.cards{

grid-template-columns:1fr;

}

}


</style>

</head>



<body>


<div class="login" id="login">


<div class="login-box">

<h1>IDNova</h1>

<p>Admin V1.1</p>


<input id="account"
placeholder="管理员账号">


<input id="password"
type="password"
placeholder="密码">


<button onclick="login()">
进入后台
</button>


</div>

</div>






<div class="admin" id="admin">


<div class="header">

<h1>
IDNova 管理中心
</h1>

<p>
服务申请管理系统
</p>


</div>



<div class="cards">


<div class="card">

<div class="num">
12
</div>

总申请

</div>


<div class="card">

<div class="num">
5
</div>

处理中

</div>


<div class="card">

<div class="num">
7
</div>

完成

</div>


</div>





<div class="card">


<h2>
申请列表
</h2>


<input placeholder="搜索客户">


<table>


<tr>

<th>
编号
</th>

<th>
客户
</th>

<th>
状态
</th>

</tr>



<tr>

<td>
ID20260714001
</td>

<td>
张三
</td>

<td>

<select>

<option>
待处理
</option>

<option>
处理中
</option>

<option>
完成
</option>

</select>


</td>

</tr>




<tr>

<td>
ID20260714002
</td>

<td>
李四
</td>

<td>

<select>

<option>
处理中
</option>

<option>
完成
</option>

</select>


</td>

</tr>



</table>


</div>



</div>






<script>


function login(){


let a=document.getElementById("account").value;

let p=document.getElementById("password").value;



if(a=="admin" && p=="123456"){


document.getElementById("login").style.display="none";


document.getElementById("admin").style.display="block";


}

else{

alert("账号密码错误");

}


}



</script>



</body>

</html>
