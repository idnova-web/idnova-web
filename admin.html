<!DOCTYPE html>

<html lang="zh-CN">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width,initial-scale=1.0">


<title>
IDNova V1.3 管理中心
</title>



<style>


*{

box-sizing:border-box;

font-family:-apple-system,BlinkMacSystemFont,
"Segoe UI","PingFang SC",sans-serif;

}



body{

margin:0;

background:#f5f5f7;

color:#111;

}



.container{

width:90%;

max-width:1100px;

margin:auto;

}





.hero{


margin-top:30px;

background:#111;

color:white;

border-radius:40px;

padding:50px;


}



.hero h1{

font-size:45px;

margin:0;

}



.hero p{

font-size:22px;

color:#ccc;

}





.cards{


display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:30px;


}



.box{


background:white;

padding:30px;

border-radius:25px;


}



.num{

font-size:45px;

font-weight:800;

}



.label{

font-size:20px;

color:#666;

}





.panel{


background:white;

margin-top:30px;

border-radius:30px;

padding:30px;


}





input{


width:100%;

padding:16px;

border-radius:15px;

border:1px solid #ddd;

font-size:16px;


}





table{


width:100%;

border-collapse:collapse;

margin-top:20px;


}



th,td{


padding:15px;

border-bottom:1px solid #eee;

text-align:center;


}




button{


border:none;

background:#111;

color:white;

padding:10px 18px;

border-radius:20px;


}



</style>


</head>


<body>



<div class="container">



<div class="hero">


<h1>
IDNova 管理中心
</h1>


<p>
V1.3 服务申请管理系统
</p>


</div>



<div class="cards">



<div class="box">

<div class="num" id="total">
0
</div>

<div class="label">
总申请
</div>

</div>



<div class="box">

<div class="num" id="doing">
0
</div>

<div class="label">
处理中
</div>

</div>



<div class="box">

<div class="num" id="done">
0
</div>

<div class="label">
已完成
</div>

</div>



</div><!-- 申请列表 -->


<div class="panel">


<h2>
申请列表
</h2>



<input 
id="search"
placeholder="搜索客户姓名 / 电话"
oninput="render()"
>



<table>


<thead>

<tr>

<th>
编号
</th>


<th>
客户
</th>


<th>
地区
</th>


<th>
状态
</th>


<th>
操作
</th>


</tr>

</thead>



<tbody id="list">


</tbody>



</table>


</div>


</div>





<script>


let data=[];




function loadData(){


data=JSON.parse(

localStorage.getItem("idnovaData")

||"[]"

);


}



function updateCount(){



document.getElementById("total").innerHTML=data.length;



document.getElementById("doing").innerHTML=


data.filter(

x=>x.status=="处理中"

).length;




document.getElementById("done").innerHTML=


data.filter(

x=>x.status=="已完成"

).length;



}




function render(){



loadData();



let keyword=document.getElementById("search").value;



let html="";



data

.filter(x=>


x.name.includes(keyword)

||
x.phone.includes(keyword)


)


.forEach((x,i)=>{


html+=`


<tr>


<td>
${i+1}
</td>



<td>

${x.name}

<br>

${x.phone}

</td>




<td>

${x.area}

</td>




<td>

${x.status}

</td>




<td>



<button onclick="changeStatus(${x.id})">

修改

</button>



<button onclick="removeItem(${x.id})">

删除

</button>



</td>



</tr>


`;



});




document.getElementById("list").innerHTML=html;



updateCount();


}





function changeStatus(id){



let item=data.find(

x=>x.id==id

);



if(item.status=="处理中"){


item.status="已完成";


}else{


item.status="处理中";


}



localStorage.setItem(

"idnovaData",

JSON.stringify(data)

);



render();


}




function removeItem(id){



if(confirm("确定删除吗？")){


data=data.filter(

x=>x.id!=id

);



localStorage.setItem(

"idnovaData",

JSON.stringify(data)

);



render();



}


}





render();



</script>




</body>

</html>
