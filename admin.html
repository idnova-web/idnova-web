<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IDNova V2.0 管理后台</title>


<style>

*{
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
"Microsoft YaHei",
sans-serif;
}


body{

margin:0;

background:#f5f5f7;

color:#111;

}


/* 登录 */

#loginPage{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}



.loginBox{

background:white;

width:380px;

padding:40px;

border-radius:30px;

box-shadow:
0 20px 60px rgba(0,0,0,.15);

text-align:center;

}



.loginBox h1{

font-size:40px;

margin-bottom:10px;

}



input{

width:100%;

padding:15px;

margin:10px 0;

border-radius:15px;

border:1px solid #ddd;

font-size:16px;

}



button{

background:#111;

color:white;

border:0;

padding:12px 20px;

border-radius:20px;

cursor:pointer;

}



button:hover{

opacity:.8;

}



/* 后台 */


#adminPage{

display:none;

}



.header{

background:#111;

color:white;

padding:30px;

border-radius:0 0 35px 35px;

}



.header h1{

margin:0;

font-size:38px;

}



.container{

padding:30px;

}



.cards{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:20px;

}



.card{

background:white;

padding:25px;

border-radius:25px;

margin-top:20px;

}



.number{

font-size:40px;

font-weight:800;

}



.title{

color:#666;

}



table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}



th{

background:#111;

color:white;

padding:12px;

}



td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}



@media(max-width:800px){

.cards{

grid-template-columns:1fr;

}


table{

font-size:12px;

}


}


</style>


</head>


<body>


<!-- 登录页面 -->


<div id="loginPage">


<div class="loginBox">


<h1>IDNova</h1>


<p>
管理员登录
</p >


<input
id="user"
placeholder="管理员账号">


<input
id="pass"
type="password"
placeholder="管理员密码">


<button onclick="login()">

进入后台

</button>


</div>


</div>



<!-- 后台 -->


<div id="adminPage">


<div class="header">


<button

style="float:right;background:#e74c3c"

onclick="logout()">

退出

</button>


<h1>
IDNova 管理中心
</h1>


<p>
订单管理系统 V2.0
</p >


</div>



<div class="container">


<div class="cards">


<div class="card">

<div class="number" id="total">
0
</div>

<div class="title">
全部订单
</div>

</div>



<div class="card">

<div class="number" id="pending">
0
</div>

<div class="title">
待审核
</div>

</div>



<div class="card">

<div class="number" id="processing">
0
</div>

<div class="title">
处理中
</div>

</div>



<div class="card">

<div class="number" id="complete">
0
</div>

<div class="title">
已完成
</div>

</div>



</div>
<!-- 订单管理 -->


<div class="card">


<h2>
订单管理
</h2>



<input

id="search"

placeholder="搜索订单编号 / 姓名 / 电话 / 邮箱"

oninput="render()"

>




<table>


<thead>


<tr>


<th>
订单编号
</th>


<th>
客户姓名
</th>


<th>
联系电话
</th>


<th>
注册地区
</th>


<th>
注册邮箱
</th>


<th>
服务类型
</th>


<th>
订单状态
</th>


<th>
提交时间
</th>


<th>
操作
</th>


</tr>


</thead>



<tbody id="list">


</tbody>



</table>



</div>



</div>


</div>



<script>
// =======================
// IDNova V2.0 后台系统逻辑
// =======================


// 管理员账号

const ADMIN_ACCOUNT="admin";

const ADMIN_PASSWORD="123456";




// 登录

function login(){


let user=
document.getElementById("user").value;


let pass=
document.getElementById("pass").value;



if(
user===ADMIN_ACCOUNT
&&
pass===ADMIN_PASSWORD
){


localStorage.setItem(
"idnovaAdmin",
"true"
);


openAdmin();


}

else{


alert("账号或密码错误");


}


}







// 打开后台


function openAdmin(){


document.getElementById("loginPage")
.style.display="none";


document.getElementById("adminPage")
.style.display="block";


render();


}







// 退出后台


function logout(){


localStorage.removeItem(
"idnovaAdmin"
);


location.reload();


}








// 获取首页提交订单


function getData(){


return JSON.parse(

localStorage.getItem(
"idnovaData"
)

||"[]"

);


}








// 保存订单


function saveData(data){


localStorage.setItem(

"idnovaData",

JSON.stringify(data)

);


}









// 渲染订单列表


function render(){



let data=getData();



let keyword=

document.getElementById("search")

.value

.toLowerCase();




let html="";





data.filter(item=>{


return(


!keyword


||


(item.id||"")

.toLowerCase()

.includes(keyword)



||


(item.name||"")

.toLowerCase()

.includes(keyword)



||


(item.phone||"")

.includes(keyword)



||


(item.email||"")

.toLowerCase()

.includes(keyword)



);



})

.forEach((item,index)=>{





html+=`

<tr>


<td>

${item.id || "-"}

</td>



<td>

${item.name || "-"}

</td>



<td>

${item.phone || "-"}

</td>



<td>

${item.country || "-"}

</td>



<td>

${item.email || "-"}

</td>



<td>

${item.service || "-"}

</td>



<td>

${item.status || "待审核"}

</td>



<td>

${item.time || "-"}

</td>



<td>


<button onclick="changeStatus(${index})">

修改

</button>


<button onclick="deleteItem(${index})">

删除

</button>


</td>



</tr>

`;



});





document.getElementById("list")

.innerHTML=html;



updateCount();



}











// 修改订单状态


function changeStatus(index){


let data=getData();



let status=data[index].status;




if(status==="待审核"){


data[index].status="处理中";


}

else if(status==="处理中"){


data[index].status="已完成";


}

else{


data[index].status="待审核";


}



saveData(data);


render();



}











// 删除订单


function deleteItem(index){


if(confirm("确定删除这个订单吗？")){


let data=getData();



data.splice(index,1);



saveData(data);



render();



}


}











// 更新统计


function updateCount(){


let data=getData();




document.getElementById("total")

.innerHTML=data.length;




document.getElementById("pending")

.innerHTML=

data.filter(

x=>x.status==="待审核"

).length;





document.getElementById("processing")

.innerHTML=

data.filter(

x=>x.status==="处理中"

).length;





document.getElementById("complete")

.innerHTML=

data.filter(

x=>x.status==="已完成"

).length;



}











// 自动登录


window.onload=function(){



if(

localStorage.getItem(

"idnovaAdmin"

)

){


openAdmin();


}



};



</script>


</body>

</html>
