<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IDNova V2.0 智能服务平台</title>


<style>

*{
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
"Microsoft YaHei",
sans-serif;
}


body{

margin:0;

background:#f5f5f7;

color:#111;

}


/* 顶部 */

.header{

background:#111;

color:white;

padding:30px 8%;

display:flex;

justify-content:space-between;

align-items:center;

}


.logo{

font-size:36px;

font-weight:800;

}


.header button{

background:white;

color:#111;

border:0;

padding:12px 25px;

border-radius:30px;

}



/* 首页 */

.hero{

padding:90px 8%;

text-align:center;

}



.hero h1{

font-size:60px;

margin:0;

}


.hero p{

font-size:22px;

color:#666;

}



/* 服务 */

.services{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:20px;

padding:40px 8%;

}


.box{

background:white;

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

}




/* 表单 */

.formBox{

background:white;

max-width:600px;

margin:50px auto;

padding:40px;

border-radius:35px;

box-shadow:
0 20px 50px rgba(0,0,0,.12);

}



input,
select,
textarea{


width:100%;

padding:15px;

margin:10px 0;

border-radius:15px;

border:1px solid #ddd;

font-size:16px;

}



textarea{

height:120px;

}



.submit{

background:#111;

color:white;

border:0;

padding:15px;

width:100%;

border-radius:30px;

font-size:18px;

cursor:pointer;

}



.submit:hover{

opacity:.8;

}



.footer{

text-align:center;

padding:40px;

color:#777;

}



@media(max-width:800px){


.hero h1{

font-size:40px;

}


.services{

grid-template-columns:1fr;

}


}


</style>


</head>



<body>



<header class="header">


<div class="logo">

IDNova

</div>


<button onclick="scrollForm()">

立即申请

</button>


</header>






<section class="hero">


<h1>

智能数字服务平台

</h1>


<p>

帮助企业连接全球技术与数字化解决方案

</p>


</section>







<section class="services">


<div class="box">

<h2>
网站建设
</h2>

<p>
企业官网、电商平台
</p>

</div>



<div class="box">

<h2>
APP开发
</h2>

<p>
移动应用开发服务
</p>

</div>



<div class="box">

<h2>
AI应用
</h2>

<p>
人工智能解决方案
</p>

</div>



<div class="box">

<h2>
数字化系统
</h2>

<p>
企业管理系统
</p>

</div>



</section>







<div class="formBox" id="apply">


<h2>

提交服务申请

</h2>



<input

id="name"

placeholder="姓名">


<input

id="phone"

placeholder="联系电话">





<select id="country">


<option value="">

请选择注册地区

</option>


<option>
中国
</option>


<option>
日本
</option>


<option>
韩国
</option>


<option>
美国
</option>


<option>
加拿大
</option>


<option>
英国
</option>


<option>
法国
</option>


<option>
德国
</option>


<option>
澳大利亚
</option>


<option>
新加坡
</option>


<option>
马来西亚
</option>


<option>
泰国
</option>


<option>
印度
</option>


<option>
阿联酋
</option>


<option>
其他
</option>


</select>





<select id="service">


<option value="">

请选择服务类型

</option>


<option>
网站建设
</option>


<option>
APP开发
</option>


<option>
软件系统
</option>


<option>
AI应用
</option>


<option>
企业数字化
</option>


<option>
品牌设计
</option>


<option>
其他
</option>


</select>







<textarea

id="desc"

placeholder="请输入您的需求">

</textarea>






<button

class="submit"

onclick="submitForm()">

提交申请

</button>



</div>







<footer class="footer">

© 2026 IDNova Digital

</footer>








<script>


function scrollForm(){

document
.getElementById("apply")
.scrollIntoView();

}






function submitForm(){



let data=

JSON.parse(

localStorage.getItem(
"idnovaData"
)

||

"[]"

);





let order=

"ID"

+

Date.now();







let item={


id:order,


name:

document.getElementById("name").value,


phone:

document.getElementById("phone").value,



country:

document.getElementById("country").value,



service:

document.getElementById("service").value,



desc:

document.getElementById("desc").value,



status:

"待审核",



time:

new Date()
.toLocaleString()



};






if(!item.name ||
!item.country ||
!item.service){


alert(
"请填写完整信息"
);


return;


}





data.push(item);




localStorage.setItem(

"idnovaData",

JSON.stringify(data)

);






alert(

"申请提交成功！\n订单编号："+order

);





document
.getElementById("name")
.value="";

document
.getElementById("phone")
.value="";

document
.getElementById("desc")
.value="";



}



</script>



</body>

</html>
