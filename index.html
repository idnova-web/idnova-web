<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IDNova V1.2 官方服务平台</title>


<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}


body{
margin:0;
background:#f5f6fa;
color:#111;
}


.container{
width:92%;
max-width:1200px;
margin:auto;
}


/* 顶部 */

header{

background:#111;
color:white;
padding:18px 0;

}


.nav{

display:flex;
justify-content:space-between;
align-items:center;

}


.logo{

font-size:26px;
font-weight:800;

}


.btn{

background:white;
color:#111;
padding:10px 22px;
border-radius:30px;
text-decoration:none;

}


/* Hero */


.hero{

margin-top:30px;
background:#111;
color:white;
padding:70px 30px;
border-radius:30px;
text-align:center;

}


.hero h1{

font-size:48px;
margin:0;

}


.hero p{

font-size:22px;
opacity:.8;

}


/* 服务 */


.section{

margin-top:40px;

}


.title{

font-size:32px;
font-weight:800;
margin-bottom:20px;

}



.grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;

}


.card{

background:white;
padding:30px;
border-radius:24px;

}


.card h3{

font-size:22px;

}


.card p{

color:#666;

}



</style>

</head>

IDNova

</p>

<p>
申请 · 查询 · 管理 · 数据一体化
</p>


</div>


<div class="section">


<div class="title">
核心服务
</div>


<div class="grid">


<div class="card">

<h3>
服务申请
</h3>

<p>
快速提交业务需求，智能匹配服务方案。
</p>

<div class="card">

</div>
