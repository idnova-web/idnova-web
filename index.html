<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IDNova V2.0 智能服务平台</title>


<style>

*{
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
"Microsoft YaHei",
sans-serif;
}


body{

margin:0;

background:#f5f5f7;

color:#111;

}


/* 顶部 */

.header{

background:#111;

color:white;

padding:25px 8%;

display:flex;

justify-content:space-between;

align-items:center;

}


.logo{

font-size:36px;

font-weight:800;

}



.header button{

background:white;

color:#111;

border:0;

padding:12px 25px;

border-radius:30px;

cursor:pointer;

}



/* 主视觉 */

.hero{

padding:80px 8%;

text-align:center;

}



.hero h1{

font-size:56px;

margin-bottom:20px;

}



.hero p{

font-size:22px;

color:#666;

}




/* 服务 */

.services{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:20px;

padding:30px 8%;

}



.serviceBox{

background:white;

padding:30px;

border-radius:25px;

text-align:center;

}



/* 表单 */

.formBox{

max-width:600px;

margin:60px auto;

background:white;

padding:40px;

border-radius:35px;

box-shadow:
0 20px 50px rgba(0,0,0,.12);

}



input,
select,
textarea{


width:100%;

padding:15px;

margin:10px 0;

border-radius:15px;

border:1px solid #ddd;

font-size:16px;

}



textarea{

height:120px;

}



.notice{

background:#f5f5f5;

padding:15px;

border-radius:15px;

font-size:14px;

color:#666;

}



.submitBtn{

width:100%;

background:#111;

color:white;

padding:16px;

border:0;

border-radius:30px;

font-size:18px;

cursor:pointer;

}



.footer{

text-align:center;

padding:40px;

color:#777;

}



@media(max-width:800px){

.services{

grid-template-columns:1fr;

}


.hero h1{

font-size:38px;

}


}


</style>


</head>


<body>


<div class="header">

<div class="serviceBox">

<div class="formBox" id="apply">

提交服务申请
</h2>

提示：账号相关密码由系统随机生成，
完成后客户可以自行修改密码。
请勿在此页面填写任何密码信息。

</p>





<input

id="orderNo"

placeholder="请输入咸鱼订单编号">





<input

id="name"

placeholder="请输入客户姓名">





<input

id="phone"

placeholder="请输入联系电话">





<select id="country">


<option value="">

请选择注册地区

</option>


<option>

</option>


<option>
日本
</option>


<option>
韩国

<option>

<option>

</option>


<option>

</option>

<input

id="email"

<select id="service">

</option>


<option>

</option>

</option>

id="desc"

placeholder="请输入其他需求说明">

</textarea>






<button

class="submitBtn"

onclick="submitOrder()">

提交申请

</button>



</div>
<footer class="footer">

© 2026 IDNova Digital

</footer>





<script>


// 滚动到申请区域

function goApply(){

document
.getElementById("apply")
.scrollIntoView({

behavior:"smooth"

});

}







// 提交订单


function submitOrder(){



let data = JSON.parse(

localStorage.getItem("idnovaData")

||

"[]"

);





let orderId =

"ID"

+

Date.now();






let order = {



id:

orderId,



// 咸鱼订单编号

orderNo:

document
.getElementById("orderNo")
.value,



// 客户姓名

name:

document
.getElementById("name")
.value,



// 电话

phone:

document
.getElementById("phone")
.value,



// 注册邮箱

email:

document
.getElementById("email")
.value,



// 注册地区

country:

document
.getElementById("country")
.value,



// 服务类型

service:

document
.getElementById("service")
.value,



// 客户备注

desc:

document
.getElementById("desc")
.value,



// 状态

status:

"待审核",



// 时间

time:

new Date()
.toLocaleString()



};







// 必填检查


if(

!order.orderNo ||

!order.name ||

!order.phone ||

!order.email ||

!order.country

){


alert(
"请填写完整信息"
);


return;


}







// 保存订单


data.push(order);



localStorage.setItem(

"idnovaData",

JSON.stringify(data)

);






alert(

"提交成功！\n订单编号："+orderId

);






// 清空表单


document
.getElementById("orderNo")
.value="";


document
.getElementById("name")
.value="";


document
.getElementById("phone")
.value="";


document
.getElementById("email")
.value="";


document
.getElementById("desc")
.value="";



}



</script>



</body>

</html>
